<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grid Master - Drawing Assistant</title>
    <style>
        :root { 
            --primary-color: #007bff; 
            --bg-color: #f4f7f9; 
            --sidebar-bg: #ffffff;
            --header-bg: #007bff;
            --text-color: #333333;
            --border-color: #dee2e6;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            color: var(--text-color); 
            overflow: hidden; 
        }
        
        header { 
            background: var(--header-bg); 
            color: white; 
            padding: 8px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 0.9rem;
            z-index: 30; 
            flex-shrink: 0;
        }

        main { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
        }
        
        /* サイドバー */
        #sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            padding: 15px; 
            overflow-y: auto; 
            border-right: 1px solid var(--border-color); 
            z-index: 20; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.02);
        }

        .control-group { 
            border-bottom: 1px solid #f1f1f1; 
            padding-bottom: 10px; 
        }

        label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 600; 
            margin-bottom: 5px; 
            color: #666; 
        }
        
        input[type="number"], input[type="range"], select { 
            width: 100%; 
            padding: 7px; 
            background: #fff; 
            border: 1px solid var(--border-color); 
            border-radius: 4px; 
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        input[type="color"] { 
            border: 1px solid var(--border-color); 
            height: 32px; 
            width: 50px;
            padding: 2px;
            cursor: pointer;
        }
        
        .row { display: flex; gap: 5px; align-items: center; }
        
        /* プレビューエリア */
        #canvas-container { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #d1d8dd; 
            touch-action: none;
        }

        canvas { 
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); 
            background: white; 
            cursor: move;
        }

        #drop-overlay { 
            position: absolute; inset: 0; 
            background: rgba(0, 123, 255, 0.1); 
            border: 3px dashed var(--primary-color); 
            display: none; align-items: center; justify-content: center; 
            z-index: 100; color: var(--primary-color); font-weight: bold; 
            pointer-events: none;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 5px;
        }

        button { 
            width: 100%; padding: 12px; 
            border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; 
            font-size: 0.9rem; 
            transition: 0.2s;
        }

        #downloadBtn { background: var(--primary-color); color: white; }
        #downloadBtn:hover { background: #0056b3; }
        
        .hint-text {
            font-size: 0.65rem;
            color: #999;
            line-height: 1.4;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 4px;
        }

        /* レスポンシブ対応 (モバイル最適化) */
        @media (max-width: 768px) {
            main { 
                flex-direction: column; 
                overflow-y: auto; 
            }
            #sidebar { 
                width: 100%; height: auto; 
                border-right: none; 
                padding: 15px; 
                overflow-y: visible; 
                box-sizing: border-box;
            }
            #canvas-container { 
                height: 45vh;
                min-height: 320px;
                flex: none; 
            }
            .hint-text { display: none; }
        }
    </style>
</head>
<body>

<div id="drop-overlay">画像をここにドロップ</div>

<header>Grid Master for Artists</header>

<main>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <aside id="sidebar">
        <div class="control-group">
            <label>1. 画像を読み込む</label>
            <input type="file" id="upload" accept="image/*">
        </div>

        <div class="control-group">
            <label>2. 分割数 (縦 × 横)</label>
            <div class="row">
                <input type="number" id="rows" value="4"> <span>×</span> <input type="number" id="cols" value="4">
            </div>
        </div>

        <div class="control-group">
            <label>3. 画像の透過度: <span id="opacityDisplay">70</span>%</label>
            <input type="range" id="opacity" min="0" max="100" value="70">
        </div>

        <div class="control-group">
            <label>4. グリッドの色・太さ</label>
            <div class="row">
                <input type="color" id="gridColor" value="#000000">
                <input type="number" id="gridWeight" value="6" min="1">
            </div>
        </div>

        <div class="hint-text">
            <b>操作ガイド</b><br>
            ・枠内のドラッグ：移動<br>
            ・枠の角/辺をドラッグ：リサイズ<br>
            ・マウスホイール：等比拡大縮小
        </div>

        <div class="btn-group">
            <button id="downloadBtn">画像を保存 (2枚同時)</button>
            <p style="font-size:0.6rem; color:#666; margin:0;">※「画像+グリッド」と「透過グリッド」を保存します</p>
        </div>
    </aside>
</main>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const dropOverlay = document.getElementById('drop-overlay');
    
    const upload = document.getElementById('upload');
    const rowsInput = document.getElementById('rows');
    const colsInput = document.getElementById('cols');
    const opacityInput = document.getElementById('opacity');
    const gridColorInput = document.getElementById('gridColor');
    const gridWeightInput = document.getElementById('gridWeight');

    let img = new Image();
    let scale = 1.0;
    let crop = { x: 0, y: 0, w: 100, h: 100 };
    let interactionMode = 'none';
    let activeHandle = null;
    let lastMouse = { x: 0, y: 0 };
    const handleSize = 20; // モバイルでの掴みやすさを考慮

    // --- ファイル処理 ---
    function handleFile(file) {
        if (!file || !file.type.match('image.*')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            img.onload = () => {
                crop = { x: 0, y: 0, w: img.width, h: img.height };
                autoFitScale();
                updateUI();
                draw();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    upload.onchange = (e) => handleFile(e.target.files[0]);
    window.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
    window.addEventListener('dragleave', (e) => { if (e.relatedTarget === null) dropOverlay.style.display = 'none'; });
    window.addEventListener('drop', (e) => { e.preventDefault(); dropOverlay.style.display = 'none'; handleFile(e.dataTransfer.files[0]); });

    function autoFitScale() {
        const padding = 20;
        scale = Math.min((container.clientWidth - padding) / img.width, (container.clientHeight - padding) / img.height, 1.0);
    }

    function getMousePos(e, isTouch = false) {
        const rect = canvas.getBoundingClientRect();
        const clientX = isTouch ? e.touches[0].clientX : e.clientX;
        const clientY = isTouch ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) / scale, y: (clientY - rect.top) / scale };
    }

    function getHandles() {
        const hs = handleSize / scale;
        const hw = hs / 2;
        return {
            tl: { x: crop.x, y: crop.y, w: hs, h: hs },
            tr: { x: crop.x + crop.w - hs, y: crop.y, w: hs, h: hs },
            bl: { x: crop.x, y: crop.y + crop.h - hs, w: hs, h: hs },
            br: { x: crop.x + crop.w - hs, y: crop.y + crop.h - hs, w: hs, h: hs },
            t:  { x: crop.x + crop.w/2 - hw, y: crop.y, w: hs, h: hs },
            b:  { x: crop.x + crop.w/2 - hw, y: crop.y + crop.h - hs, w: hs, h: hs },
            l:  { x: crop.x, y: crop.y + crop.h/2 - hw, w: hs, h: hs },
            r:  { x: crop.x + crop.w - hs, y: crop.y + crop.h/2 - hw, w: hs, h: hs }
        };
    }

    // --- インタラクション制御 ---
    function startAction(e, isTouch = false) {
        if (!img.src) return;
        const m = getMousePos(e, isTouch);
        const handles = getHandles();
        const clientX = isTouch ? e.touches[0].clientX : e.clientX;
        const clientY = isTouch ? e.touches[0].clientY : e.clientY;

        activeHandle = null;
        for (const [key, h] of Object.entries(handles)) {
            if (m.x >= h.x && m.x <= h.x + h.w && m.y >= h.y && m.y <= h.y + h.h) {
                activeHandle = key; interactionMode = 'resizing'; break;
            }
        }
        if (!activeHandle) {
            if (m.x >= crop.x && m.x <= crop.x + crop.w && m.y >= crop.y && m.y <= crop.y + crop.h) interactionMode = 'moving';
            else interactionMode = 'none';
        }
        lastMouse = { x: clientX, y: clientY };
    }

    function handleMove(e, clientX, clientY, isTouch = false) {
        if (!img.src || interactionMode === 'none') return;
        if (isTouch && e.cancelable) e.preventDefault();

        const m = getMousePos(e, isTouch);
        const dx = (clientX - lastMouse.x) / scale;
        const dy = (clientY - lastMouse.y) / scale;
        const minS = 30;

        if (interactionMode === 'moving') {
            crop.x += dx; crop.y += dy;
        } else if (interactionMode === 'resizing') {
            const R = crop.x + crop.w; const B = crop.y + crop.h;
            switch (activeHandle) {
                case 'tl': crop.x = Math.min(m.x, R-minS); crop.y = Math.min(m.y, B-minS); crop.w = R-crop.x; crop.h = B-crop.y; break;
                case 'tr': crop.y = Math.min(m.y, B-minS); crop.w = Math.max(m.x-crop.x, minS); crop.h = B-crop.y; break;
                case 'bl': crop.x = Math.min(m.x, R-minS); crop.w = R-crop.x; crop.h = Math.max(m.y-crop.y, minS); break;
                case 'br': crop.w = Math.max(m.x-crop.x, minS); crop.h = Math.max(m.y-crop.y, minS); break;
                case 't':  crop.y = Math.min(m.y, B-minS); crop.h = B-crop.y; break;
                case 'b':  crop.h = Math.max(m.y-crop.y, minS); break;
                case 'l':  crop.x = Math.min(m.x, R-minS); crop.w = R-crop.x; break;
                case 'r':  crop.w = Math.max(m.x-crop.x, minS); break;
            }
        }
        lastMouse = { x: clientX, y: clientY };
        clampCrop(); draw();
    }

    container.addEventListener('pointerdown', (e) => { startAction(e, false); container.setPointerCapture(e.pointerId); });
    container.addEventListener('touchstart', (e) => startAction(e, true), { passive: false });
    window.addEventListener('pointermove', (e) => handleMove(e, e.clientX, e.clientY, false));
    container.addEventListener('touchmove', (e) => handleMove(e, e.touches[0].clientX, e.touches[0].clientY, true), { passive: false });
    window.addEventListener('pointerup', () => interactionMode = 'none');
    window.addEventListener('touchend', () => interactionMode = 'none');

    container.onwheel = (e) => {
        if (!img.src) return;
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.95 : 1.05;
        const newW = crop.w * factor; const newH = crop.h * factor;
        if (newW > 20 && newW <= img.width && newH > 20 && newH <= img.height) {
            crop.x -= (newW - crop.w) / 2; crop.y -= (newH - crop.h) / 2;
            crop.w = newW; crop.h = newH;
        }
        clampCrop(); draw();
    };

    function clampCrop() {
        if (crop.x < 0) crop.x = 0; if (crop.y < 0) crop.y = 0;
        if (crop.x + crop.w > img.width) { if(interactionMode === 'moving') crop.x = img.width - crop.w; else crop.w = img.width - crop.x; }
        if (crop.y + crop.h > img.height) { if(interactionMode === 'moving') crop.y = img.height - crop.h; else crop.h = img.height - crop.y; }
    }

    function updateUI() { document.getElementById('opacityDisplay').innerText = opacityInput.value; }

    // --- 描画処理 ---
    function draw() {
        if (!img.src) return;
        canvas.width = img.width; canvas.height = img.height;
        canvas.style.transform = `scale(${scale})`;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 元画像
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = opacityInput.value / 100; ctx.drawImage(img, 0, 0); ctx.globalAlpha = 1.0;

        // マスク (切り抜き範囲外を暗く)
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, crop.y);
        ctx.fillRect(0, crop.y + crop.h, canvas.width, canvas.height - (crop.y + crop.h));
        ctx.fillRect(0, crop.y, crop.x, crop.h);
        ctx.fillRect(crop.x + crop.w, crop.y, canvas.width - (crop.x + crop.w), crop.h);

        // グリッド
        drawGrid(ctx, crop.x, crop.y, crop.w, crop.h);

        // 操作ハンドル
        ctx.fillStyle = "#007bff"; ctx.strokeStyle = "#fff"; ctx.lineWidth = 2 / scale;
        const handles = getHandles();
        const hs = handleSize / scale;
        for (const h of Object.values(handles)) { ctx.fillRect(h.x, h.y, h.w, h.h); ctx.strokeRect(h.x, h.y, h.w, h.h); }
    }

    function drawGrid(targetCtx, x, y, w, h, isExport = false) {
        const r = parseInt(rowsInput.value) || 1;
        const c = parseInt(colsInput.value) || 1;
        targetCtx.strokeStyle = gridColorInput.value;
        targetCtx.lineWidth = parseInt(gridWeightInput.value);
        targetCtx.beginPath();
        for (let i = 0; i <= c; i++) {
            const posX = isExport ? (w/c)*i : x + (w/c)*i;
            targetCtx.moveTo(posX, isExport ? 0 : y);
            targetCtx.lineTo(posX, isExport ? h : y + h);
        }
        for (let i = 0; i <= r; i++) {
            const posY = isExport ? (h/r)*i : y + (h/r)*i;
            targetCtx.moveTo(isExport ? 0 : x, posY);
            targetCtx.lineTo(isExport ? w : x + w, posY);
        }
        targetCtx.stroke();
    }

    [rowsInput, colsInput, opacityInput, gridColorInput, gridWeightInput].forEach(el => el.oninput = () => { updateUI(); draw(); });

    // --- 保存機能 ---
    document.getElementById('downloadBtn').onclick = () => {
        if (!img.src) return;

        // 1. 画像＋グリッドの保存
        saveResult(true, 'gridded_photo.png');

        // 2. 透過グリッドのみの保存 (少し遅らせて連続ダウンロードを安定させる)
        setTimeout(() => {
            saveResult(false, 'grid_only.png');
        }, 600);
    };

    function saveResult(includeImage, fileName) {
        const sC = document.createElement('canvas');
        sC.width = crop.w; sC.height = crop.h;
        const s = sC.getContext('2d');

        if (includeImage) {
            s.fillStyle = "#fff"; s.fillRect(0, 0, crop.w, crop.h);
            s.globalAlpha = opacityInput.value / 100;
            s.drawImage(img, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h);
            s.globalAlpha = 1.0;
        } else {
            s.clearRect(0, 0, crop.w, crop.h); // 透明
        }

        drawGrid(s, 0, 0, crop.w, crop.h, true);

        const a = document.createElement('a');
        a.download = fileName;
        a.href = sC.toDataURL('image/png');
        a.click();
    }

    window.onresize = () => { if(img.src) { autoFitScale(); draw(); } };
</script>
</body>
</html>
